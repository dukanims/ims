<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Internship Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=Noto+Kufi+Arabic:wght@500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=44" />
</head>
<body>
  <button id="langToggle" class="lang-btn lang-float">English</button>

  <div class="auth-shell">
    <aside class="auth-aside">
      <div class="brand-row">
        <div class="emblem">SCMS</div>
        <b style="line-height:1.5;"><span data-i18n="org_top">سەرۆکایەتی زانکۆی پۆلیتەکنیکی سلێمانی</span><br/>
          <span data-i18n="org_sub" style="font-weight:500;opacity:.85;font-size:14px;">پەیمانگای تەکنیکی دوکان</span></b>
      </div>
      <div class="hero-mid">
        <span class="hero-kicker" data-i18n="hero_kicker">Clearance Platform</span>
        <div class="hero-accent"></div>
        <h1 data-i18n="sys_name">سیستەمی بەڕێوەبردنی ئەستۆپاکی خوێندکاران</h1>
      </div>
      <div class="foot">&nbsp;</div>
    </aside>

    <main class="auth-main">
      <div class="auth-card">
        <h2 data-i18n="login_title">Sign in to your account</h2>

        <div id="alert" class="alert err"></div>

        <form id="loginForm">
          <div class="field">
            <label for="username" data-i18n="f_username">Username</label>
            <input id="username" type="text" autocomplete="username" data-i18n-ph="ph_username" placeholder="admin" required />
          </div>
          <div class="field">
            <label for="password" data-i18n="f_password">Password</label>
            <div class="pass-wrap">
              <input id="password" type="password" autocomplete="current-password" data-i18n-ph="ph_password" placeholder="Your password" required />
              <button type="button" id="passToggle" class="pass-eye" aria-label="Show password">
                <svg id="eyeIcon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button id="submitBtn" type="submit" class="btn block" data-i18n="sign_in">Sign in</button>
        </form>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/i18n.js?v=44"></script>
  <script src="js/firebase-config.js?v=44"></script>
  <script src="js/login.js?v=44"></script>
</body>
</html>
